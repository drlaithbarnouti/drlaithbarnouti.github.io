<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Dr Laith Barnouti | FRACS Plastic Surgeon Sydney Australia</title>
  <meta name="description" content="Learn about Dr Laith Barnouti — FRACS-qualified Specialist Plastic Surgeon in Sydney with 15+ years experience, international fellowships in Sweden, Brazil, Belgium and USA, and a Conjoint Senior Lecturer at UNSW." />
  <meta name="keywords" content="Dr Laith Barnouti, about plastic surgeon Sydney, FRACS surgeon profile, reconstructive surgery Australia, UNSW surgeon lecturer, short scar surgery expert" />
  <meta name="author" content="Dr Laith Barnouti" />
  <meta property="og:title" content="About Dr Laith Barnouti | Specialist Plastic Surgeon Sydney" />
  <meta property="og:description" content="Discover the distinguished career, global training, and patient-first philosophy of Dr Laith Barnouti — Sydney's leading FRACS plastic surgeon." />
  <meta property="og:type" content="profile" />
  <link class="canonical" href="https://www.drlaithbarnouti.com.au/about.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #eef4f8;
      --deep: #376B8C;
      --gold: #376B8C;
      --gold-light: #5a91b5;
      --muted: #4a6b80;
      --border: #c5dae8;
      --white: #ffffff;
      --section-gap: 100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--deep);
      font-size: 17px;
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 60px;
      background: rgba(247,244,239,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--deep);
      text-decoration: none;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }

    .nav-brand span {
      display: block;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s;
    }

    .nav-links a:hover, .nav-links a[aria-current] { color: var(--gold); }

    .nav-links .btn-nav {
      background: var(--deep);
      color: var(--cream);
      padding: 10px 24px;
      letter-spacing: 0.12em;
      transition: background 0.25s;
    }

    .nav-links .btn-nav:hover { background: var(--gold); color: var(--white); }

    /* ── PAGE HERO ── */
    .page-hero {
      padding-top: 86px;
      background: var(--deep);
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 70px;
      padding-left: 60px;
      padding-right: 60px;
      position: relative;
      overflow: hidden;
    }

    .page-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 30%, rgba(184,150,90,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 80%, rgba(184,150,90,0.06) 0%, transparent 45%);
    }

    .page-hero::after {
      content: 'ABOUT';
      position: absolute;
      top: 50%;
      right: -20px;
      transform: translateY(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 180px;
      font-weight: 300;
      color: rgba(255,255,255,0.025);
      line-height: 1;
      letter-spacing: 0.05em;
      pointer-events: none;
      user-select: none;
    }

    .page-hero-content { position: relative; z-index: 1; }

    .breadcrumb {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(247,244,239,0.4);
      margin-bottom: 24px;
    }

    .breadcrumb a {
      color: rgba(247,244,239,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }

    .breadcrumb a:hover { color: var(--gold); }

    .breadcrumb span { margin: 0 10px; }

    .page-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 5.5vw, 72px);
      font-weight: 300;
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .page-hero h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    .page-hero .hero-sub {
      font-size: 16px;
      color: rgba(247,244,239,0.6);
      max-width: 600px;
      line-height: 1.75;
    }

    /* ── PROFILE INTRO ── */
    .profile-intro {
      background: var(--white);
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
    }

    .profile-sidebar {
      background: var(--cream);
      padding: 60px 44px;
      border-right: 1px solid var(--border);
    }

    .profile-card {
      background: var(--deep);
      padding: 44px 36px;
      margin-bottom: 32px;
    }

    .profile-monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: 80px;
      font-weight: 300;
      color: rgba(184,150,90,0.2);
      line-height: 1;
      margin-bottom: 16px;
    }

    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--cream);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .profile-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      line-height: 1.6;
    }

    .sidebar-section { margin-bottom: 36px; }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .sidebar-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .sidebar-list li::before {
      content: '—';
      color: var(--gold);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .sidebar-contact a {
      display: block;
      font-size: 14px;
      color: var(--deep);
      text-decoration: none;
      line-height: 1.6;
      transition: color 0.2s;
    }

    .sidebar-contact a:hover { color: var(--gold); }

    .profile-main { padding: 70px 70px; }

    .profile-main h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 28px;
      line-height: 1.2;
    }

    .profile-main p {
      font-size: 16.5px;
      color: var(--muted);
      line-height: 1.9;
      margin-bottom: 22px;
    }

    .profile-main p strong {
      color: var(--deep);
      font-weight: 500;
    }

    .gold-divider {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 36px 0;
    }

    /* ── TIMELINE ── */
    .timeline-section {
      background: var(--cream);
      padding: var(--section-gap) 60px;
    }

    .section-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(34px, 4vw, 50px);
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 60px;
      line-height: 1.15;
    }

    .timeline {
      position: relative;
      padding-left: 60px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 8px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .timeline-item {
      position: relative;
      padding-bottom: 52px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -53px;
      top: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--cream);
      box-shadow: 0 0 0 1px var(--gold);
    }

    .timeline-item:last-child { padding-bottom: 0; }

    .timeline-year {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .timeline-item h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 500;
      color: var(--deep);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .timeline-item p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.85;
      max-width: 700px;
    }

    /* ── FELLOWSHIPS ── */
    .fellowships-section {
      background: var(--deep);
      padding: var(--section-gap) 60px;
    }

    .fellowships-section .section-eyebrow { color: var(--gold); }
    .fellowships-section .section-title { color: var(--cream); }

    .fellowships-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-top: 0;
    }

    .fellowship-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(184,150,90,0.15);
      padding: 44px 32px;
      transition: background 0.3s, border-color 0.3s;
    }

    .fellowship-card:hover {
      background: rgba(184,150,90,0.08);
      border-color: rgba(184,150,90,0.35);
    }

    .fellowship-flag {
      font-size: 32px;
      margin-bottom: 16px;
      display: block;
    }

    .fellowship-country {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .fellowship-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .fellowship-card p {
      font-size: 14px;
      color: rgba(247,244,239,0.55);
      line-height: 1.8;
    }

    /* ── PHILOSOPHY ── */
    .philosophy-section {
      background: var(--white);
      padding: var(--section-gap) 60px;
    }

    .philosophy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .philosophy-text h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 28px;
      line-height: 1.15;
    }

    .philosophy-text p {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.9;
      margin-bottom: 20px;
    }

    .philosophy-text p strong { color: var(--deep); font-weight: 500; }

    .philosophy-pillars {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .pillar {
      padding: 28px 32px;
      border-left: 3px solid var(--gold);
      background: var(--cream);
    }

    .pillar h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--deep);
      margin-bottom: 8px;
    }

    .pillar p {
      font-size: 14.5px;
      color: var(--muted);
      line-height: 1.75;
    }

    /* ── ACADEMIC SECTION ── */
    .academic-section {
      background: var(--cream);
      padding: var(--section-gap) 60px;
    }

    .academic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      margin-top: 60px;
    }

    .academic-block {
      background: var(--white);
      padding: 44px 40px;
    }

    .academic-block h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--deep);
      margin-bottom: 12px;
    }

    .academic-block .block-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .academic-block p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.85;
    }

    /* ── PATIENT APPROACH ── */
    .approach-section {
      background: var(--deep);
      padding: var(--section-gap) 60px;
    }

    .approach-section .section-eyebrow { color: var(--gold); }
    .approach-section .section-title { color: var(--cream); }

    .approach-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-top: 60px;
    }

    .approach-step {
      background: rgba(255,255,255,0.03);
      padding: 44px 32px;
      position: relative;
    }

    .step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 60px;
      font-weight: 300;
      color: rgba(184,150,90,0.18);
      line-height: 1;
      margin-bottom: 16px;
    }

    .approach-step h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .approach-step p {
      font-size: 14.5px;
      color: rgba(247,244,239,0.5);
      line-height: 1.8;
    }

    /* ── QUOTE ── */
    .quote-band {
      background: var(--gold);
      padding: 90px 60px;
      text-align: center;
    }

    .quote-band blockquote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 3.5vw, 44px);
      font-style: italic;
      font-weight: 300;
      color: var(--white);
      max-width: 900px;
      margin: 0 auto 24px;
      line-height: 1.45;
    }

    .quote-band cite {
      font-size: 12px;
      font-style: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    /* ── CONTACT ── */
    .contact-section {
      background: var(--white);
      padding: var(--section-gap) 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .contact-left h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 20px;
      line-height: 1.15;
    }

    .contact-left p {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 36px;
    }

    .contact-details { display: flex; flex-direction: column; gap: 24px; }

    .contact-detail-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .contact-detail a, .contact-detail span {
      font-size: 16px;
      color: var(--deep);
      text-decoration: none;
      display: block;
      transition: color 0.2s;
    }

    .contact-detail a:hover { color: var(--gold); }

    .contact-right {
      background: var(--cream);
      padding: 44px 40px;
    }

    .contact-right h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--deep);
      margin-bottom: 28px;
    }

    .contact-right ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-right li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    .contact-right li::before {
      content: '✦';
      color: var(--gold);
      font-size: 9px;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .btn-primary {
      display: inline-block;
      background: var(--deep);
      color: var(--cream);
      padding: 15px 36px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.25s, transform 0.2s;
      margin-top: 8px;
    }

    .btn-primary:hover { background: var(--gold); transform: translateY(-2px); }

    /* ── FOOTER ── */
    footer {
      background: var(--deep);
      border-top: 1px solid rgba(247,244,239,0.08);
      padding: 40px 60px;
    }

    footer p {
      font-size: 12px;
      color: rgba(247,244,239,0.4);
      letter-spacing: 0.08em;
    }

    .footer-links {
      display: flex;
      gap: 28px;
    }

    .footer-links a {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(247,244,239,0.45);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--gold); }

    /* ── FOOTER SOCIAL ── */
    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      padding-bottom: 20px;
    }

    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: rgba(255,255,255,0.85);
    }

    .footer-brand span {
      display: block;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,
